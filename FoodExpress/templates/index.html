<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Food Expresser</title>

  
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <style>
    body {
      background-color: #f8f9fa;
    }

    h1, h2 {
      text-align: center;
      margin-top: 20px;
    }

    .menu-buttons {
      text-align: center;
      margin: 30px 0;
    }

    .menu-buttons button {
      margin: 5px;
    }

    .carousel img {
      height: 400px;
      object-fit: cover;
    }
  </style>
</head>

<body>

  
  <h1>Página Inicial - McSusu</h1>

  <h2>O melhor lanche do Nova Natal é o Mac da Susu 🍔</h2>

  
  <div class="menu-buttons">

    <a href="cardapio.html">
      <button type="button" class="btn btn-primary">
        Cardápio
      </button>
    </a>

    <button type="button" class="btn btn-secondary">
      Lanches
    </button>

    <button type="button" class="btn btn-success">
      Pedidos
    </button>

    <button type="button" class="btn btn-danger">
      Clientes
    </button>

    <button type="button" class="btn btn-warning">
      Contatos
    </button>

  </div>

  
  <div id="carouselExample" class="carousel slide container" data-bs-ride="carousel">

    <div class="carousel-inner">

      <div class="carousel-item active">
        <img src="banner1.jpg" class="d-block w-100" alt="Banner 1">
      </div>

      <div class="carousel-item">
        <img src="banner2.jpg" class="d-block w-100" alt="Banner 2">
      </div>

    
    <button class="carousel-control-prev"
            type="button"
            data-bs-target="#carouselExample"
            data-bs-slide="prev">

      <span class="carousel-control-prev-icon" aria-hidden="true"></span>

    </button>

    
    <button class="carousel-control-next"
            type="button"
            data-bs-target="#carouselExample"
            data-bs-slide="next">

      <span class="carousel-control-next-icon" aria-hidden="true"></span>

    </button>

  </div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
